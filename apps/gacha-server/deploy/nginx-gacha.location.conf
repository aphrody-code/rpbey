# Exposition publique du serveur gacha (Colyseus :5050) en HTTPS/WSS.
#
# À insérer dans le server{} TLS de api.rpbey.fr (/etc/nginx/conf.d/api.rpbey.fr.conf),
# AVANT le `location /` catch-all qui proxy vers le bot (:3001).
#
# - REST économie : https://api.rpbey.fr/gacha/api/gacha/*  (Bearer)
# - Token Activity : https://api.rpbey.fr/gacha/discord_token
# - WS temps réel  : wss://api.rpbey.fr/gacha/...           (matchmaking + Room)
#
# Le préfixe `/gacha/` est retiré (trailing slash sur proxy_pass).
# Le CORS est géré par le serveur lui-même (origines *.discordsays.com + rpbey.fr).
# Réutilise la map globale $connection_upgrade définie dans rpbey.fr.conf.
#
# upstream à déclarer au niveau http{} :
#   upstream gacha_rt { server 127.0.0.1:5050; keepalive 8; }

location /gacha/ {
    proxy_pass         http://gacha_rt/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_buffering    off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
