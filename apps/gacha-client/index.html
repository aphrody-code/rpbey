<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="color-scheme" content="dark" />
    <title>RPB Gacha</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07070c;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        color: #cfd2e6;
        letter-spacing: 0.08em;
        font-size: 13px;
        text-transform: uppercase;
        z-index: 10;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      #boot.hidden {
        opacity: 0;
      }
      #boot .ring {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #e23b5a;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div class="ring"></div>
      <span>Chargement…</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
