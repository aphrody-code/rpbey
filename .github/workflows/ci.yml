name: CI

# Gates the checks that pass reproducibly on the rpbey Bun + Turborepo monorepo.
#
# Intentionally NOT gated: the Next.js web build (`bun run build` / `build:web`).
# The web build segfaults under Bun 1.3.14 (panic: Segmentation fault, exit 137)
# during the TypeScript phase — documented in CLAUDE.md. Adding it would make CI
# permanently red, so type safety for the web app is covered by `type-check`
# (`bunx tsc --noEmit` per app) instead.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type-check + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Must match the VPS Bun that writes bun.lock (lockfileVersion 2 +
          # configVersion 0). Bun 1.3.14 errors: "Unknown lockfile version".
          bun-version: canary

      # rpbey depends on @aphrody-code/* packages on GitHub Packages
      # (m3-react, m3-tokens, bxc, x, canvas, challonge, eslint-plugin-m3).
      # Without this .npmrc the frozen install 401s on every one of them.
      - name: Auth GitHub Packages (@aphrody-code/*, @rpbey/*, @rose-griffon/*)
        env:
          GH_PKG: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          printf "@aphrody-code:registry=https://npm.pkg.github.com\n@rpbey:registry=https://npm.pkg.github.com\n@rose-griffon:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$GH_PKG" > .npmrc
          cp .npmrc ~/.npmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # oxlint over apps + packages. Verified passing locally (exit 0,
      # warnings only, no errors).
      - name: Lint (oxlint)
        run: bun run lint

      # turbo run type-check — builds shared packages then `tsc --noEmit`
      # per app. Verified passing locally (13/13 tasks, exit 0).
      - name: Type-check
        run: bun run type-check

      # Custom runner covers EVERY workspace scope (turbo silently skips the
      # script-less ones — gacha-server + dashboard HAVE test files but no
      # `test` script). --strict fails on any zero-test scope. The vendored
      # discordx fork (incl. the broken `@rpbey/discordx` leaf with its missing
      # self-dep) is classified + skipped with a reason, not run, so no manual
      # --filter is needed. Live/opt-in suites (challonge live paths) self-skip.
      - name: Test (every scope, strict)
        run: bun run test:ci
