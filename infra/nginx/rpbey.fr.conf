# rpbey.fr — site Next.js self-host VPS (monorepo rpbey, upstream rpbey-web :3002)
# À installer au cutover (phase 6) APRÈS : build web OK + service rpbey-web actif +
# cert Let's Encrypt généré (certbot --nginx -d rpbey.fr -d www.rpbey.fr) +
# re-swap DNS OVH rpbey.fr/www -> 51.77.147.152 (ou Cloudflare proxy).
upstream rpbey_web { server 127.0.0.1:3002; keepalive 32; }

server {
    listen 80;
    server_name rpbey.fr www.rpbey.fr;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name www.rpbey.fr;
    ssl_certificate     /etc/letsencrypt/live/rpbey.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpbey.fr/privkey.pem;
    return 301 https://rpbey.fr$request_uri;
}

server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name rpbey.fr;

    ssl_certificate     /etc/letsencrypt/live/rpbey.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpbey.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_rpbey:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;
    access_log /var/log/nginx/rpbey-access.log;
    error_log  /var/log/nginx/rpbey-error.log;

    location ~* "\.(env|git/|sql|bak|old|swp|DS_Store)$" { return 410; }

    # Assets immutables Next : cache long, servis directement
    location /_next/static/ {
        proxy_pass http://rpbey_web;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://rpbey_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
